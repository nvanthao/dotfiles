# window
window:
  dimensions:
    columns: 133
    lines: 40
  opacity: 0.98
  padding:
    x: 10
    y: 10
  decorations: buttonless

# colors (Solarized Dark)
colors:
  # Default colors
  primary:
    background: '0x002b36'
    foreground: '0x839496'

  # Normal colors
  normal:
    black:   '0x073642'
    red:     '0xdc322f'
    green:   '0x859900'
    yellow:  '0xb58900'
    blue:    '0x268bd2'
    magenta: '0xd33682'
    cyan:    '0x2aa198'
    white:   '0xeee8d5'

  # Bright colors
  bright:
    black:   '0x002b36'
    red:     '0xcb4b16'
    green:   '0x586e75'
    yellow:  '0x657b83'
    blue:    '0x839496'
    magenta: '0x6c71c4'
    cyan:    '0x93a1a1'
    white:   '0xfdf6e3'

# font
font:
  size: 20

# selection
selection:
  save_to_clipboard: true

# cursor
cursor:
  style:
    shape: Beam
  vi_mode_style:
    shape: Block

# shell
shell:
  program: /bin/zsh
  args:
    - -l
    - -c
    - '/opt/homebrew/bin/tmux attach || /opt/homebrew/bin/tmux'
